<nav class="navbar" [class.scrolled]="scrolled">
  <div class="navbar__container">

    <!-- Logo -->
    <a class="navbar__logo" routerLink="/">
      <svg class="navbar__logo-icon" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="18" cy="18" r="18" fill="#4A90A4" fill-opacity="0.12"/>
        <path d="M10 13C10 11.343 11.343 10 13 10H23C24.657 10 26 11.343 26 13V20C26 21.657 24.657 23 23 23H20L16 26V23H13C11.343 23 10 21.657 10 20V13Z"
              fill="#4A90A4"/>
        <circle cx="14.5" cy="16.5" r="1.5" fill="white"/>
        <circle cx="18" cy="16.5" r="1.5" fill="white"/>
        <circle cx="21.5" cy="16.5" r="1.5" fill="white"/>
      </svg>
      <span class="navbar__logo-text">Vel<span>mora</span></span>
    </a>

    <!-- Desktop Menu -->
    <ul class="navbar__menu" [class.open]="menuOpen">
      <li>
        <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" (click)="closeMenu()">Home</a>
      </li>
      <li>
        <a routerLink="/counsellors" routerLinkActive="active" (click)="closeMenu()">Counsellors</a>
      </li>
      <li>
        <a routerLink="/about" routerLinkActive="active" (click)="closeMenu()">About</a>
      </li>
      <li>
        <a routerLink="/contact" routerLinkActive="active" (click)="closeMenu()">Contact</a>
      </li>
    </ul>

    <!-- Auth Actions -->
    <div class="navbar__actions">
      <!-- Not authenticated -->
      <ng-container *ngIf="!currentUser">
        <a routerLink="/auth/login" class="navbar__btn navbar__btn--outline" (click)="closeMenu()">Login</a>
        <a routerLink="/auth/register" class="navbar__btn navbar__btn--primary" (click)="closeMenu()">Sign Up</a>
      </ng-container>

      <!-- Authenticated -->
      <ng-container *ngIf="currentUser">
        <a [routerLink]="dashboardRoute" class="navbar__btn navbar__btn--outline" (click)="closeMenu()">Dashboard</a>
        <button class="navbar__btn navbar__btn--primary" (click)="logout()">Logout</button>
      </ng-container>
    </div>

    <!-- Hamburger -->
    <button class="navbar__toggle" [class.open]="menuOpen" (click)="toggleMenu()" aria-label="Toggle menu">
      <span></span>
      <span></span>
      <span></span>
    </button>

  </div>
</nav>
